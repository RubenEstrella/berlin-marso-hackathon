# Hydra config for the IL training dispatcher (il/train.py).
# This is an IMAGE challenge -> the default method is the RGB Diffusion Policy.
# Pick a method with method=... and override any hyperparameter on the CLI, e.g.
#   pixi run python il/train.py                              # default: dp_rgb (image DP)
#   pixi run python il/train.py method=dp_rgb flags.total_iters=8000 flags.eval_freq=4000
defaults:
  - _self_
  - method: dp_rgb   # method config (@package _global_) overrides the shared defaults above

# shared across all methods
env_id: WarehouseSort-v1
control_mode: pd_ee_delta_pos
sim_backend: gpu
max_episode_steps: 200
demo_dir: all                   # easy / medium / hard / all (balanced across levels)
demo_path: null                 # null -> auto (state/rgb dataset chosen by method.demo_kind)

hydra:
  output_subdir: null
  run:
    dir: .
