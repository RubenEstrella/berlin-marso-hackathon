# ─────────────────────────────────────────────────────────────────────────────
# SUBMISSION MANIFEST  (copy to submission.yaml and edit)
#
# This is the ONE file a team hands to the judge. It declares:
#   * which policy code loads your checkpoint (the obs→action contract),
#   * which difficulty levels you want scored,
#   * the checkpoint to use for each.
#
# The judge reads this manifest, runs the held-out eval for every level you declare,
# and computes the weighted sort-accuracy score. Anything you do NOT declare scores 0
# for that level — but its weight still counts (easy 0.2, medium 0.3, hard 0.5).
#
# This is an IMAGE challenge (observation is always rgb). Because the rgb observation has
# the same shape at every difficulty, ONE checkpoint can serve all three levels (shown
# below) — or train per level and point each at its own file.
# ─────────────────────────────────────────────────────────────────────────────

team: "team-name"

# Policy entrypoint  "module:function"  (see warehouse_sort/il_policy.py and
# examples/random_policy.py for the contract). Used for every level unless overridden.
policy: warehouse_sort.il_policy:load_dp_rgb

levels:

  easy:
    checkpoint: il/baselines/diffusion_policy/runs/warehouse_rgb_dp/checkpoints/best_eval_sort_accuracy.pt

  medium:
    checkpoint: il/baselines/diffusion_policy/runs/warehouse_rgb_dp/checkpoints/best_eval_sort_accuracy.pt

  hard:
    checkpoint: il/baselines/diffusion_policy/runs/warehouse_rgb_dp/checkpoints/best_eval_sort_accuracy.pt

    # You can override the entrypoint per level too, e.g. a different policy on hard:
    # policy: my_module:load_policy
